responses:
  NotificationThreadListWithoutPagination:
    description: NotificationThreadListWithoutPagination - Notification threads without pagination headers
    schema:
      type: array
      items:
        $ref: '#/definitions/NotificationThread'
  forbidden:
    description: APIForbiddenError is a forbidden error response
    schema:
      $ref: '#/definitions/APIForbiddenError'
  NotificationThreadList:
    description: NotificationThreadList
    schema:
      type: array
      items:
        $ref: '#/definitions/NotificationThread'
    headers:
      X-Total-Count:
        type: integer
        format: int64
        description: The total number of notification threads
  NotificationThread:
    description: NotificationThread
    schema:
      $ref: '#/definitions/NotificationThread'
  NotificationCount:
    description: Number of unread notifications
    schema:
      $ref: '#/definitions/NotificationCount'
  notFound:
    description: APINotFound is a not found error response
    schema:
      $ref: '#/definitions/APINotFound'
securityDefinitions:
  AuthorizationHeaderToken:
    description: API tokens must be prepended with "token" followed by a space.
    type: apiKey
    name: Authorization
    in: header
  BasicAuth:
    type: basic
  SudoHeader:
    description: Sudo API request as the user provided as the key. Admin privileges are required.
    type: apiKey
    name: Sudo
    in: header
  SudoParam:
    description: Sudo API request as the user provided as the key. Admin privileges are required.
    type: apiKey
    name: sudo
    in: query
  TOTPHeader:
    description: Must be used in combination with BasicAuth if two-factor authentication is enabled.
    type: apiKey
    name: X-FORGEJO-OTP
    in: header
