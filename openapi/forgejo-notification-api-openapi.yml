swagger: '2.0'
info:
  description: This documentation describes the Forgejo API.
  title: Forgejo activitypub notification API
  license:
    name: This file is distributed under the MIT license for the purpose of interoperability
    url: http://opensource.org/licenses/MIT
  version: 16.0.0-dev-465-4b83448b7d+gitea-1.22.0
basePath: /api/v1
schemes:
- https
- http
consumes:
- application/json
- text/plain
produces:
- application/json
- text/html
security:
- BasicAuth: []
- AuthorizationHeaderToken: []
- SudoParam: []
- SudoHeader: []
- TOTPHeader: []
tags:
- name: notification
paths:
  /notifications:
    get:
      consumes:
      - application/json
      produces:
      - application/json
      tags:
      - notification
      summary: List users's notification threads
      operationId: notifyGetList
      parameters:
      - type: boolean
        description: If true, show notifications marked as read. Default value is false
        name: all
        in: query
      - type: array
        items:
          type: string
        collectionFormat: multi
        description: 'Show notifications with the provided status types. Options are: unread, read and/or pinned. Defaults to unread & pinned.'
        name: status-types
        in: query
      - type: array
        items:
          enum:
          - issue
          - pull
          - repository
          type: string
        collectionFormat: multi
        description: filter notifications by subject type
        name: subject-type
        in: query
      - type: string
        format: date-time
        description: Only show notifications updated after the given time. This is a timestamp in RFC 3339 format
        name: since
        in: query
      - type: string
        format: date-time
        description: Only show notifications updated before the given time. This is a timestamp in RFC 3339 format
        name: before
        in: query
      - type: integer
        description: page number of results to return (1-based)
        name: page
        in: query
      - type: integer
        description: page size of results
        name: limit
        in: query
      responses:
        '200':
          $ref: '#/responses/NotificationThreadList'
    put:
      consumes:
      - application/json
      produces:
      - application/json
      tags:
      - notification
      summary: Mark notification threads as read, pinned or unread
      operationId: notifyReadList
      parameters:
      - type: string
        format: date-time
        description: Describes the last point that notifications were checked. Anything updated since this time will not be updated.
        name: last_read_at
        in: query
      - type: boolean
        description: If true, mark all notifications on this repo. Default value is false
        name: all
        in: query
      - type: array
        items:
          type: string
        collectionFormat: multi
        description: 'Mark notifications with the provided status types. Options are: unread, read and/or pinned. Defaults to unread.'
        name: status-types
        in: query
      - type: string
        description: Status to mark notifications as, Defaults to read.
        name: to-status
        in: query
      responses:
        '205':
          $ref: '#/responses/NotificationThreadListWithoutPagination'
  /notifications/new:
    get:
      tags:
      - notification
      summary: Check if unread notifications exist
      operationId: notifyNewAvailable
      responses:
        '200':
          $ref: '#/responses/NotificationCount'
  /notifications/threads/{id}:
    get:
      consumes:
      - application/json
      produces:
      - application/json
      tags:
      - notification
      summary: Get notification thread by ID
      operationId: notifyGetThread
      parameters:
      - type: integer
        format: int64
        description: id of notification thread
        name: id
        in: path
        required: true
      responses:
        '200':
          $ref: '#/responses/NotificationThread'
        '403':
          $ref: '#/responses/forbidden'
        '404':
          $ref: '#/responses/notFound'
    patch:
      consumes:
      - application/json
      produces:
      - application/json
      tags:
      - notification
      summary: Mark notification thread as read by ID
      operationId: notifyReadThread
      parameters:
      - type: integer
        format: int64
        description: id of notification thread
        name: id
        in: path
        required: true
      - type: string
        default: read
        description: Status to mark notifications as
        name: to-status
        in: query
      responses:
        '205':
          $ref: '#/responses/NotificationThread'
        '403':
          $ref: '#/responses/forbidden'
        '404':
          $ref: '#/responses/notFound'
  /repos/{owner}/{repo}/notifications:
    get:
      consumes:
      - application/json
      produces:
      - application/json
      tags:
      - notification
      summary: List users's notification threads on a specific repo
      operationId: notifyGetRepoList
      parameters:
      - type: string
        description: owner of the repo
        name: owner
        in: path
        required: true
      - type: string
        description: name of the repo
        name: repo
        in: path
        required: true
      - type: boolean
        description: If true, show notifications marked as read. Default value is false
        name: all
        in: query
      - type: array
        items:
          type: string
        collectionFormat: multi
        description: 'Show notifications with the provided status types. Options are: unread, read and/or pinned. Defaults to unread & pinned'
        name: status-types
        in: query
      - type: array
        items:
          enum:
          - issue
          - pull
          - repository
          type: string
        collectionFormat: multi
        description: filter notifications by subject type
        name: subject-type
        in: query
      - type: string
        format: date-time
        description: Only show notifications updated after the given time. This is a timestamp in RFC 3339 format
        name: since
        in: query
      - type: string
        format: date-time
        description: Only show notifications updated before the given time. This is a timestamp in RFC 3339 format
        name: before
        in: query
      - type: integer
        description: page number of results to return (1-based)
        name: page
        in: query
      - type: integer
        description: page size of results
        name: limit
        in: query
      responses:
        '200':
          $ref: '#/responses/NotificationThreadList'
    put:
      consumes:
      - application/json
      produces:
      - application/json
      tags:
      - notification
      summary: Mark notification threads as read, pinned or unread on a specific repo
      operationId: notifyReadRepoList
      parameters:
      - type: string
        description: owner of the repo
        name: owner
        in: path
        required: true
      - type: string
        description: name of the repo
        name: repo
        in: path
        required: true
      - type: boolean
        description: If true, mark all notifications on this repo. Default value is false
        name: all
        in: query
      - type: array
        items:
          type: string
        collectionFormat: multi
        description: 'Mark notifications with the provided status types. Options are: unread, read and/or pinned. Defaults to unread.'
        name: status-types
        in: query
      - type: string
        description: Status to mark notifications as. Defaults to read.
        name: to-status
        in: query
      - type: string
        format: date-time
        description: Describes the last point that notifications were checked. Anything updated since this time will not be updated.
        name: last_read_at
        in: query
      responses:
        '205':
          $ref: '#/responses/NotificationThreadListWithoutPagination'
