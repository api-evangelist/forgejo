        in: path
        required: true
      - type: string
        description: name of the repo
        name: repo
        in: path
        required: true
      - type: integer
        format: int64
        description: id of the comment
        name: id
        in: path
        required: true
      responses:
        '200':
          $ref: '#/responses/Comment'
        '204':
          $ref: '#/responses/empty'
        '403':
          $ref: '#/responses/forbidden'
        '404':
          $ref: '#/responses/notFound'
        '500':
