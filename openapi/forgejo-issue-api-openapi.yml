    delete:
      tags:
      - issue
      summary: Delete a comment
      operationId: issueDeleteComment
      parameters:
      - type: string
        description: owner of the repo
        name: owner
        in: path
        required: true
      - type: string
        description: name of the repo
        name: repo
        in: path
        required: true
      - type: integer
        format: int64
        description: id of comment to delete
        name: id
        in: path
        required: true
      responses:
        '204':
          $ref: '#/responses/empty'
        '403':
          $ref: '#/responses/forbidden'
        '500':
          $ref: '#/responses/internalServerError'
    patch:
      consumes:
      - application/json
      produces:
      - application/json
      tags:
      - issue
      summary: Edit a comment
      operationId: issueEditComment
      parameters:
      - type: string
        description: owner of the repo
        name: owner
        in: path
        required: true
      - type: string
        description: name of the repo
        name: repo
        in: path
        required: true
      - type: integer
        format: int64
        description: id of the comment to edit
        name: id
        in: path
        required: true
      - name: body
        in: body
        schema:
          $ref: '#/definitions/EditIssueCommentOption'
      responses:
        '200':
          $ref: '#/responses/Comment'
        '204':
          $ref: '#/responses/empty'
        '403':
          $ref: '#/responses/forbidden'
        '404':
          $ref: '#/responses/notFound'
        '423':
          $ref: '#/responses/repoArchivedError'
        '500':
          $ref: '#/responses/internalServerError'
