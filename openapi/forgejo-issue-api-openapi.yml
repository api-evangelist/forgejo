        required: true
      - type: integer
        format: int64
        description: id of the comment
        name: id
        in: path
        required: true
      - type: integer
        format: int64
        description: id of the attachment to delete
        name: attachment_id
        in: path
        required: true
      responses:
        '204':
          $ref: '#/responses/empty'
        '404':
          $ref: '#/responses/error'
        '423':
          $ref: '#/responses/repoArchivedError'
    patch:
