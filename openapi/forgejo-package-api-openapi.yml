swagger: '2.0'
info:
  description: This documentation describes the Forgejo API.
  title: Forgejo activitypub package API
  license:
    name: This file is distributed under the MIT license for the purpose of interoperability
    url: http://opensource.org/licenses/MIT
  version: 16.0.0-dev-465-4b83448b7d+gitea-1.22.0
basePath: /api/v1
schemes:
- https
- http
consumes:
- application/json
- text/plain
produces:
- application/json
- text/html
security:
- BasicAuth: []
- AuthorizationHeaderToken: []
- SudoParam: []
- SudoHeader: []
- TOTPHeader: []
tags:
- name: package
paths:
  /packages/{owner}:
    get:
      produces:
      - application/json
      tags:
      - package
      summary: Gets all packages of an owner
      operationId: listPackages
      parameters:
      - type: string
        description: owner of the packages
        name: owner
        in: path
        required: true
      - type: integer
        description: page number of results to return (1-based)
        name: page
        in: query
      - type: integer
        description: page size of results
        name: limit
        in: query
      - enum:
        - alpine
        - cargo
        - chef
        - composer
        - conan
        - conda
        - container
        - cran
        - debian
        - generic
        - go
        - helm
        - maven
        - npm
        - nuget
        - pub
        - pypi
        - rpm
        - rubygems
        - swift
        - vagrant
        type: string
        description: package type filter
        name: type
        in: query
      - type: string
        description: name filter
        name: q
        in: query
      responses:
        '200':
          $ref: '#/responses/PackageList'
        '404':
          $ref: '#/responses/notFound'
  /packages/{owner}/{type}/{name}/-/link/{repo_name}:
    post:
      tags:
      - package
      summary: Link a package to a repository
      operationId: linkPackage
      parameters:
      - type: string
        description: owner of the package
        name: owner
        in: path
        required: true
      - type: string
        description: type of the package
        name: type
        in: path
        required: true
      - type: string
        description: name of the package
        name: name
        in: path
        required: true
      - type: string
        description: name of the repository to link.
        name: repo_name
        in: path
        required: true
      responses:
        '201':
          $ref: '#/responses/empty'
        '404':
          $ref: '#/responses/notFound'
  /packages/{owner}/{type}/{name}/-/unlink:
    post:
      tags:
      - package
      summary: Unlink a package from a repository
      operationId: unlinkPackage
      parameters:
      - type: string
        description: owner of the package
        name: owner
        in: path
        required: true
      - type: string
        description: type of the package
        name: type
        in: path
        required: true
      - type: string
        description: name of the package
        name: name
        in: path
        required: true
      responses:
        '201':
          $ref: '#/responses/empty'
        '404':
          $ref: '#/responses/notFound'
  /packages/{owner}/{type}/{name}/{version}:
    get:
      produces:
      - application/json
      tags:
      - package
      summary: Gets a package
      operationId: getPackage
      parameters:
      - type: string
        description: owner of the package
        name: owner
        in: path
        required: true
      - type: string
        description: type of the package
        name: type
        in: path
        required: true
      - type: string
        description: name of the package
        name: name
        in: path
        required: true
      - type: string
        description: version of the package
        name: version
        in: path
        required: true
      responses:
        '200':
          $ref: '#/responses/Package'
        '404':
          $ref: '#/responses/notFound'
    delete:
      tags:
      - package
      summary: Delete a package
      operationId: deletePackage
      parameters:
      - type: string
        description: owner of the package
        name: owner
        in: path
        required: true
      - type: string
        description: type of the package
        name: type
        in: path
        required: true
      - type: string
        description: name of the package
        name: name
        in: path
        required: true
      - type: string
        description: version of the package
        name: version
        in: path
        required: true
      responses:
        '204':
          $ref: '#/responses/empty'
        '404':
          $ref: '#/responses/notFound'
  /packages/{owner}/{type}/{name}/{version}/files:
    get:
      produces:
      - application/json
      tags:
      - package
      summary: Gets all files of a package
      operationId: listPackageFiles
      parameters:
      - type: string
        description: owner of the package
        name: owner
        in: path
        required: true
      - type: string
        description: type of the package
        name: type
        in: path
        required: true
      - type: string
        description: name of the package
        name: name
        in: path
        required: true
      - type: string
        description: version of the package
        name: version
        in: path
        required: true
      responses:
        '200':
          $ref: '#/responses/PackageFileList'
        '404':
          $ref: '#/responses/notFound'
