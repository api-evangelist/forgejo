swagger: '2.0'
info:
  description: This documentation describes the Forgejo API.
  title: Forgejo activitypub miscellaneous API
  license:
    name: This file is distributed under the MIT license for the purpose of interoperability
    url: http://opensource.org/licenses/MIT
  version: 16.0.0-dev-465-4b83448b7d+gitea-1.22.0
basePath: /api/v1
schemes:
- https
- http
consumes:
- application/json
- text/plain
produces:
- application/json
- text/html
security:
- BasicAuth: []
- AuthorizationHeaderToken: []
- SudoParam: []
- SudoHeader: []
- TOTPHeader: []
tags:
- name: miscellaneous
paths:
  /actions/run:
    get:
      description: 'The automatic actions token must be used as the authentication mechanism (<code>Authorization: Bearer $&#x7b;&#x7b; forgejo.token &#x7d;&#x7d;</code>); other types of tokens cannot be used. The token is associated with the job, which must be still running for the request to this endpoint to succeed.

        '
      produces:
      - application/json
      tags:
      - miscellaneous
      summary: Get a workflow run associated with a token
      operationId: getActionsRun
      responses:
        '200':
          $ref: '#/responses/ActionRun'
  /gitignore/templates:
    get:
      produces:
      - application/json
      tags:
      - miscellaneous
      summary: Returns a list of all gitignore templates
      operationId: listGitignoresTemplates
      responses:
        '200':
          $ref: '#/responses/GitignoreTemplateList'
  /gitignore/templates/{name}:
    get:
      produces:
      - application/json
      tags:
      - miscellaneous
      summary: Returns information about a gitignore template
      operationId: getGitignoreTemplateInfo
      parameters:
      - type: string
        description: name of the template
        name: name
        in: path
        required: true
      responses:
        '200':
          $ref: '#/responses/GitignoreTemplateInfo'
        '404':
          $ref: '#/responses/notFound'
  /label/templates:
    get:
      produces:
      - application/json
      tags:
      - miscellaneous
      summary: Returns a list of all label templates
      operationId: listLabelTemplates
      responses:
        '200':
          $ref: '#/responses/LabelTemplateList'
  /label/templates/{name}:
    get:
      produces:
      - application/json
      tags:
      - miscellaneous
      summary: Returns all labels in a template
      operationId: getLabelTemplateInfo
      parameters:
      - type: string
        description: name of the template
        name: name
        in: path
        required: true
      responses:
        '200':
          $ref: '#/responses/LabelTemplateInfo'
        '404':
          $ref: '#/responses/notFound'
  /licenses:
    get:
      produces:
      - application/json
      tags:
      - miscellaneous
      summary: Returns a list of all license templates
      operationId: listLicenseTemplates
      responses:
        '200':
          $ref: '#/responses/LicenseTemplateList'
  /licenses/{name}:
    get:
      produces:
      - application/json
      tags:
      - miscellaneous
      summary: Returns information about a license template
      operationId: getLicenseTemplateInfo
      parameters:
      - type: string
        description: name of the license
        name: name
        in: path
        required: true
      responses:
        '200':
          $ref: '#/responses/LicenseTemplateInfo'
        '404':
          $ref: '#/responses/notFound'
  /markdown:
    post:
      consumes:
      - application/json
      produces:
      - text/html
      tags:
      - miscellaneous
      summary: Render a markdown document as HTML
      operationId: renderMarkdown
      parameters:
      - name: body
        in: body
        schema:
          $ref: '#/definitions/MarkdownOption'
      responses:
        '200':
          $ref: '#/responses/MarkdownRender'
        '422':
          $ref: '#/responses/validationError'
  /markdown/raw:
    post:
      consumes:
      - text/plain
      produces:
      - text/html
      tags:
      - miscellaneous
      summary: Render raw markdown as HTML
      operationId: renderMarkdownRaw
      parameters:
      - description: Request body to render
        name: body
        in: body
        required: true
        schema:
          type: string
      responses:
        '200':
          $ref: '#/responses/MarkdownRender'
        '422':
          $ref: '#/responses/validationError'
  /markup:
    post:
      consumes:
      - application/json
      produces:
      - text/html
      tags:
      - miscellaneous
      summary: Render a markup document as HTML
      operationId: renderMarkup
      parameters:
      - name: body
        in: body
        schema:
          $ref: '#/definitions/MarkupOption'
      responses:
        '200':
          $ref: '#/responses/MarkupRender'
        '422':
          $ref: '#/responses/validationError'
  /nodeinfo:
    get:
      produces:
      - application/json
      tags:
      - miscellaneous
      summary: Returns the nodeinfo of the Forgejo application
      operationId: getNodeInfo
      responses:
        '200':
          $ref: '#/responses/NodeInfo'
  /signing-key.gpg:
    get:
      produces:
      - text/plain
      tags:
      - miscellaneous
      summary: Get default signing-key.gpg
      operationId: getSigningKey
      responses:
        '200':
          description: GPG armored public key
          schema:
            type: string
  /signing-key.ssh:
    get:
      produces:
      - text/plain
      tags:
      - miscellaneous
      summary: Get default signing-key.ssh
      operationId: getSSHSigningKey
      responses:
        '200':
          description: SSH public key in OpenSSH authorized key format
          schema:
            type: string
        '404':
          $ref: '#/responses/notFound'
  /version:
    get:
      produces:
      - application/json
      tags:
      - miscellaneous
      summary: Returns the version of the running application
      operationId: getVersion
      responses:
        '200':
          $ref: '#/responses/ServerVersion'
