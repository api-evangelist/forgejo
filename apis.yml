apis:
  - aid: forgejo:forgejo-api
    name: Forgejo REST API
    description: The Forgejo REST API (v1) provides programmatic access to all forge functionality including repository management, user and organization administration, issues, pull requests, CI/CD Actions runners, package registries, webhooks, notifications, and ActivityPub federation endpoints. The API is documented via Swagger (OpenAPI v2) and accessible on any Forgejo instance at /api/v1.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://forgejo.org/docs/latest/user/api-usage/
    baseURL: https://code.forgejo.org/api/v1
